# Sweep many align/refine/patches combinations against the same homography+flow
# synthetic view and emit a combined results.csv + summary.md + summary.png.
#
# Each experiment names the three swappable pipeline stages, so combinations that
# needed a bespoke class before (e.g. sift + raft + sgbm) are now just a config row.
#
# The classical experiments (akaze/sift, flow) run under .venv. RAFT and RoMa need
# the user python 3.13 (torch/torchvision/romatch) — comment those rows out to run
# the rest under .venv, or run the whole batch under the user python.
save_dir: Experiments_de_eval/all_matchers
overwrite: true

data:
  source: ../../data/iphone2samsung_or/pair-np-dv/paired/iphone-x/dng
  target: ../../data/iphone2samsung_or/pair-np-dv/paired/samsung-s9/dng
image_ext: [".mat"]
sample_indices: [0, 1, 2]
n_workers: 4
save_debug: false

synth:
  type: homography_flow
  params:
    homography_noise_std: 0.05
    flow_backend: farneback          # CPU synth flow so classical rows run under .venv
    farneback_params: {pyr_scale: 0.5, levels: 6, winsize: 25, iterations: 5, poly_n: 5, poly_sigma: 1.2, flags: 0}
    seed: 0

eval:
  gradient_threshold: 25.0
  linearize: false

experiments:
  # --- align=keypoint_homography, refine=none (projective-only baselines) ---
  - name: akaze_homography
    matcher:
      align:   {type: keypoint_homography, params: {detector: akaze, use_ransac: true, ransac_threshold: 1.0}}
      refine:  {type: none}
      patches: {type: gradient, params: {resize: 0.10, gradient_threshold: 25.0, window_radius: 2.0, grid_k: 3}}

  - name: sift_homography
    matcher:
      align:   {type: keypoint_homography, params: {detector: sift, use_ransac: true, ransac_threshold: 1.0}}
      refine:  {type: none}
      patches: {type: gradient, params: {resize: 0.10, gradient_threshold: 25.0, window_radius: 2.0, grid_k: 3}}

  # --- refine=flow (recovers the nonlinear warp -> lower ΔE) ---
  - name: akaze_flow
    matcher:
      align:   {type: keypoint_homography, params: {detector: akaze, use_ransac: true, ransac_threshold: 1.0}}
      refine:  {type: flow}
      patches: {type: gradient, params: {resize: 0.10, gradient_threshold: 25.0, window_radius: 2.0, grid_k: 3}}

  - name: sift_flow
    matcher:
      align:   {type: keypoint_homography, params: {detector: sift, use_ransac: true, ransac_threshold: 1.0}}
      refine:  {type: flow}
      patches: {type: gradient, params: {resize: 0.10, gradient_threshold: 25.0, window_radius: 2.0, grid_k: 3}}

  # --- patches=sgbm ---
  - name: akaze_homography_sgbm
    matcher:
      align:   {type: keypoint_homography, params: {detector: akaze, use_ransac: true, ransac_threshold: 1.0}}
      refine:  {type: none}
      patches: {type: sgbm, params: {detector: akaze, min_disparity: -64, num_disparities: 192, block_size: 7, fundamental_threshold: 1.0, window_radius: 2.0, grid_k: 3}}

  # --- a previously-impossible mix: keypoint align + flow refine + sgbm patches ---
  - name: sift_flow_sgbm
    matcher:
      align:   {type: keypoint_homography, params: {detector: sift, use_ransac: true, ransac_threshold: 1.0}}
      refine:  {type: flow}
      patches: {type: sgbm, params: {detector: akaze, min_disparity: -64, num_disparities: 192, block_size: 7, fundamental_threshold: 1.0, window_radius: 2.0, grid_k: 3}}

  # Requires the user python 3.13 (torch/torchvision) — RAFT refiner. Single GPU process.
  # - name: sift_raft_sgbm
  #   matcher:
  #     align:   {type: keypoint_homography, params: {detector: sift, use_ransac: true, ransac_threshold: 1.0}}
  #     refine:  {type: raft, params: {raft_h: 520, raft_w: 960}}
  #     patches: {type: sgbm, params: {detector: akaze, fundamental_threshold: 1.0, window_radius: 2.0, grid_k: 3}}

  # Requires the user python 3.13 (romatch). Single GPU process.
  # - name: roma_dense
