# Variant: REAL iphone-x + samsung-s9 paired captures, HOMOGRAPHY-ONLY synth AND
# HOMOGRAPHY-ONLY matcher (refine: none).
#
# Strictest projective baseline: the synth injects ONLY a noisy H^-1 misalignment
# (no flow), and the matcher re-aligns with a single homography and NO flow refiner.
# So nothing non-linear is added or removed — this measures pure projective
# round-trip error. Compare against:
#   - iphone_samsung_homography.yaml  (same synth, but refine: flow) -> does the flow
#     refiner help or hurt on an already projectively-aligned pair?
#   - iphone_samsung_homflow.yaml     (synth: homography_flow, refine: flow) -> full
#     non-linear synth + recovery.
#
# Colours are untouched -> ground-truth ΔE = 0; reported ΔE is registration error.
# Classical detector, no GPU -> runs under .venv; n_workers can be > 1.
experiment: iphone_samsung_homography_only
save_dir: Experiments_de_eval/iphone_samsung
overwrite: true

data:
  source: ../../data/iphone2samsung_or/pair-np-dv/paired/iphone-x/dng
  target: ../../data/iphone2samsung_or/pair-np-dv/paired/samsung-s9/dng
image_ext: [".mat"]
sample_indices: [0, 1, 2]
n_workers: 4
save_debug: true

synth:
  type: homography           # projective misalignment only (no flow)
  params:
    homography_noise_std: 0.05
    seed: 0

matcher:
  align:
    type: keypoint_homography
    params: {detector: akaze, use_ransac: true, ransac_threshold: 0.5}
  refine:
    type: none               # homography-only matcher: no flow refinement
  patches:
    type: gradient
    params: {resize: 1.0, gradient_threshold: 25.0}

eval:
  gradient_threshold: 25.0
  linearize: false
