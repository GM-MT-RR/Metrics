# Variant: REAL iphone-x + samsung-s9 paired captures, homography+flow SYNTH.
#
# Unlike the simulatron sim_persp configs (source=iphone, target=real iphone-s warp,
# synth: pass), this uses the paired .mat captures and SYNTHESIZES the distorted
# view: source = iphone-x colours, target = samsung-s9 (pose donor). The
# `homography` synth warps the source by H^-1 only (no nonlinear flow), so
# corresponding pixels share identical RGB and ground-truth ΔE = 0. Any ΔE the
# matcher reports is its own registration error.
#
# Matcher: AKAZE homography + Farneback flow refine + dense gradient patches. The
# flow refiner SHOULD recover the residual misalignment.
#
# Classical detector + flow -> runs under .venv; n_workers can be > 1.
experiment: iphone_samsung_homflow
save_dir: Experiments_de_eval/iphone_samsung
overwrite: true

data:
  source: ../../data/iphone2samsung_or/pair-np-dv/paired/iphone-x/dng
  target: ../../data/iphone2samsung_or/pair-np-dv/paired/samsung-s9/dng
image_ext: [".mat"]
sample_indices: [0, 1, 2]
n_workers: 1
save_debug: true

synth:
  type: homography           # homography-only baseline (forces flow_backend=none)
  params:
    homography_noise_std: 0.0
    seed: 0

matcher:
  align:
    type: keypoint_homography
    params: {detector: akaze, use_ransac: false, ransac_threshold: 0.5}
  refine:
    type: flow
    params: {pyr_scale: 0.5, levels: 6, winsize: 25, iterations: 5, poly_n: 5, poly_sigma: 1.2, flags: 0}
  patches:
    type: gradient
    params: {resize: 1.0, gradient_threshold: 25.0}

eval:
  gradient_threshold: 25.0
  linearize: false
