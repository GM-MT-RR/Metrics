# AKAZE keypoints + homography re-alignment (no refine) over a homography+flow
# synthetic view. With flow_amplitude_px > 0 the synth has a nonlinear warp the
# homography CANNOT undo -> expect a visibly NON-zero residual ΔE (the negative
# control). Pipeline: align=keypoint_homography, refine=none, patches=gradient.
experiment: homflow_akaze_homography_raft

save_dir: Experiments_de_eval
overwrite: true

data:
  source: ../../data/iphone2samsung_or/pair-np-dv/paired/iphone-x/dng   # iPhone (colours kept)
  target: ../../data/iphone2samsung_or/pair-np-dv/paired/samsung-s9/dng # Samsung (pose donor)
image_ext: [".mat"]
sample_indices: [0]
n_workers: 10
save_debug: true

synth:
  type: homography_flow
  params:
    homography_noise_std: 0.05
    flow_amplitude_px: 6.0
    flow_smooth_sigma: 40.0
    seed: 0

matcher:
  align:
    type: keypoint_homography
    params: {detector: akaze, use_ransac: false, ransac_threshold: 1.0}
  refine:
    type: raft
    params:
      raft_h: 520          
      raft_w: 960  
  patches:
    type: gradient
    params: {resize: 0.1, gradient_threshold: 25.0, window_radius: 2.0, grid_k: 3, max_pairs: 50000}

eval:
  gradient_threshold: 35.0
  linearize: false
