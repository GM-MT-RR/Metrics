# AKAZE keypoints + RAFT re-alignment over a homography + MEASURED-flow synthetic
# view. The synth warps the iPhone by a noisy H⁻¹ then adds the real RAFT flow
# (warped iPhone -> Samsung), so the nonlinear part reflects the actual device
# geometry; the RAFT refiner then tries to undo it. Pipeline:
# align=keypoint_homography, refine=raft, patches=gradient.
# n_workers: 1 — the synth's RAFT flow runs on the GPU (runner goes inline).
experiment: homflow_akaze_homography_raft

save_dir: Experiments_de_eval
overwrite: true

data:
  source: ../../data/iphone2samsung_or/pair-np-dv/paired/iphone-x/dng   # iPhone (colours kept)
  target: ../../data/iphone2samsung_or/pair-np-dv/paired/samsung-s9/dng # Samsung (pose donor)
image_ext: [".mat"]
sample_indices: [0]
n_workers: 1
save_debug: true

synth:
  type: homography_flow
  params:
    homography_noise_std: 0.05
    flow_backend: raft
    raft_h: 520
    raft_w: 960
    seed: 0

matcher:
  align:
    type: keypoint_homography
    params: {detector: akaze, use_ransac: false, ransac_threshold: 1.0}
  refine:
    type: raft
    params:
      raft_h: 520          
      raft_w: 960  
  patches:
    type: gradient
    params: {resize: 0.1, gradient_threshold: 25.0, window_radius: 2.0, grid_k: 3, max_pairs: 50000}

eval:
  gradient_threshold: 35.0
  linearize: false
