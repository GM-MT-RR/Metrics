# AKAZE keypoint+homography alignment, then SGBM patch extraction over a
# homography+flow synthetic view. The sgbm extractor fits a fundamental matrix,
# uncalibrated-rectifies, computes a StereoSGBM disparity, back-projects to matched
# centers, and samples a sub-pixel window around each -> matched RGB pairs for ΔE.
# Pipeline: align=keypoint_homography, refine=none, patches=sgbm.
experiment: homflow_akaze_sgbm
save_dir: Experiments_de_eval
overwrite: true

data:
  source: ../../data/iphone2samsung_or/pair-np-dv/paired/iphone-x/dng
  target: ../../data/iphone2samsung_or/pair-np-dv/paired/samsung-s9/dng
image_ext: [".mat"]
sample_indices: [0, 1, 2]
n_workers: 4
save_debug: true

synth:
  type: homography_flow
  params:
    homography_noise_std: 0.05
    flow_amplitude_px: 6.0
    flow_smooth_sigma: 40.0
    seed: 0

matcher:
  align:
    type: keypoint_homography
    params: {detector: akaze, use_ransac: true, ransac_threshold: 1.0}
  refine:
    type: none
  patches:
    type: sgbm
    params:
      detector: akaze
      min_disparity: -64
      num_disparities: 192
      block_size: 7
      uniqueness_ratio: 15
      speckle_window_size: 150
      speckle_range: 2
      disp12_max_diff: 1
      clahe_clip: 2.0
      fundamental_threshold: 1.0
      window_radius: 2.0
      grid_k: 3
      max_pairs: 50000

eval:
  gradient_threshold: 25.0
  linearize: false
